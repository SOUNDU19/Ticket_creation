<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="text-align: center; padding-top: 5rem;">
    <div class="glass-container" style="max-width: 600px; margin: 0 auto;">
      <div style="font-size: 8rem; margin-bottom: 1rem; animation: float 3s ease-in-out infinite;">
        🤖
      </div>
      <h1 style="font-size: 4rem; margin-bottom: 1rem;">404</h1>
      <h2 style="font-size: 2rem; margin-bottom: 1rem;">Page Not Found</h2>
      <p style="color: rgba(255,255,255,0.7); margin-bottom: 2rem; font-size: 1.125rem;">
        Oops! The page you're looking for doesn't exist or has been moved.
      </p>
      <div style="display: flex; gap: 1rem; justify-content: center;">
        <a href="index.html" class="btn btn-primary">Go Home</a>
        <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
      </div>
    </div>
  </div>

  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
  </style>

  <footer class="footer">
    <p class="footer-credit">Designed & Developed by Soundarya</p>
  </footer>
</body>
</html>
