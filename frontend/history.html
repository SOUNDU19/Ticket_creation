<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket History - NexoraAI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">NexoraAI</div>
      <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="create-ticket.html">Create Ticket</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="#" onclick="authUtils.logout()" class="btn btn-secondary">Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <h1 style="font-size: 2.5rem; margin-bottom: 2rem;">Ticket History</h1>

    <!-- Filters -->
    <div class="glass-container mb-4">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
        <div>
          <label class="form-label">Search</label>
          <input type="text" class="form-input" id="searchInput" placeholder="Search tickets...">
        </div>
        <div>
          <label class="form-label">Status</label>
          <select class="form-input" id="statusFilter">
            <option value="">All Status</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="closed">Closed</option>
          </select>
        </div>
        <div>
          <label class="form-label">Priority</label>
          <select class="form-input" id="priorityFilter">
            <option value="">All Priorities</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div style="display: flex; align-items: end;">
          <button class="btn btn-primary" onclick="loadTickets()" style="width: 100%;">Apply Filters</button>
        </div>
      </div>
    </div>

    <!-- Tickets Table -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ticketsTable">
          <tr>
            <td colspan="6" style="text-align: center; padding: 2rem;">
              <div class="spinner"></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="mt-3" style="display: flex; justify-content: center; gap: 0.5rem;"></div>
  </div>

  <footer class="footer">
    <p class="footer-credit">Designed & Developed by Soundarya</p>
  </footer>

  <script src="js/particles.js"></script>`n  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (!authUtils.protectPage()) throw new Error('Unauthorized');

    let currentPage = 1;

    async function loadTickets(page = 1) {
      currentPage = page;
      const search = document.getElementById('searchInput').value;
      const status = document.getElementById('statusFilter').value;
      const priority = document.getElementById('priorityFilter').value;

      try {
        const params = { page, per_page: 10 };
        if (search) params.search = search;
        if (status) params.status = status;
        if (priority) params.priority = priority;

        const response = await api.getTickets(params);
        const tbody = document.getElementById('ticketsTable');

        if (response.tickets.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem; color: rgba(255,255,255,0.5);">No tickets found</td></tr>';
        } else {
          tbody.innerHTML = response.tickets.map(ticket => `
            <tr style="cursor: pointer;" onclick="window.location.href='ticket-details.html?id=${ticket.id}'">
              <td style="font-weight: 600;">${ticket.title}</td>
              <td>${ticket.category}</td>
              <td><span class="badge badge-${ticket.priority === 'critical' ? 'danger' : ticket.priority === 'high' ? 'danger' : ticket.priority === 'medium' ? 'warning' : 'success'}">${ticket.priority.toUpperCase()}</span></td>
              <td><span class="badge badge-${ticket.status === 'open' ? 'primary' : ticket.status === 'in_progress' ? 'warning' : 'success'}">${ticket.status.replace('_', ' ').toUpperCase()}</span></td>
              <td>${new Date(ticket.created_at).toLocaleDateString()}</td>
              <td><button class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">View</button></td>
            </tr>
          `).join('');
        }

        // Pagination
        const paginationDiv = document.getElementById('pagination');
        if (response.pages > 1) {
          let paginationHTML = '';
          for (let i = 1; i <= response.pages; i++) {
            paginationHTML += `<button class="btn ${i === currentPage ? 'btn-primary' : 'btn-secondary'}" onclick="loadTickets(${i})" style="padding: 0.5rem 1rem;">${i}</button>`;
          }
          paginationDiv.innerHTML = paginationHTML;
        } else {
          paginationDiv.innerHTML = '';
        }
      } catch (error) {
        showToast('Failed to load tickets', 'error');
      }
    }

    loadTickets();
  </script>
</body>
</html>
