<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - NexoraAI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="max-width: 500px; margin-top: 5rem;">
    <div class="glass-container">
      <div class="text-center mb-4">
        <h1 class="logo" style="font-size: 2rem; margin-bottom: 0.5rem;">NexoraAI</h1>
        <p style="color: rgba(255,255,255,0.7);">Enter your email to reset your password</p>
      </div>

      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Send Reset Link
        </button>
      </form>

      <div class="text-center mt-3">
        <p style="color: rgba(255,255,255,0.7);">
          Remember your password? 
          <a href="login.html" style="color: var(--primary-light); text-decoration: none; font-weight: 600;">Login</a>
        </p>
      </div>

      <div class="text-center mt-3">
        <a href="index.html" style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.875rem;">← Back to Home</a>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p class="footer-credit">Designed & Developed by Soundarya</p>
  </footer>

  <script src="js/particles.js"></script>`n  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', (e) => {
      e.preventDefault();
      showToast('Password reset link sent to your email (Demo mode)', 'success');
      setTimeout(() => window.location.href = 'login.html', 2000);
    });
  </script>
</body>
</html>
